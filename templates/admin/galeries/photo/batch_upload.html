{% extends "admin/base_site.html" %}

{% block content %}
<h1>Upload en lot</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-row">
        {{ form.as_p }}
    </div>
    <div class="submit-row">
        <input type="submit" value="Uploader" class="default">
        <a href="../" class="closelink">Annuler</a>
    </div>
</form>
{% endblock %}
